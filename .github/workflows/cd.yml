name: Front CD

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch a desplegar'
        required: true
        default: 'main'
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch || github.ref_name }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_APP_NAME: ${{ vars.VITE_APP_NAME || 'InvitaSR' }}
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL || '/api' }}
          VITE_BO_ROUTE_PREFIX: ${{ vars.VITE_BO_ROUTE_PREFIX || '/backoffice' }}
          VITE_AUTH_MODE: ${{ vars.VITE_AUTH_MODE || 'cookie' }}
          VITE_PUBLIC_BASE_DOMAIN: ${{ vars.VITE_PUBLIC_BASE_DOMAIN || 'invitasr.local' }}
          VITE_PUBLIC_APP_URL: ${{ vars.VITE_PUBLIC_APP_URL || 'https://app.invitasr.local:4433' }}

      - name: Upload dist to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          source: "dist/*"
          target: "${{ secrets.DEPLOY_FRONT_DIST_PATH }}"
          rm: true
